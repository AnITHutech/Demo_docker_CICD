name: Build and Push Docker Image

# Kích hoạt workflow khi có hành động push vào nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout mã nguồn từ repo về máy ảo của GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Thiết lập Java (Cần thiết để build file .jar trước khi đóng gói Docker)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Build dự án với Maven (Tạo ra file target/*.jar)
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4. Đăng nhập vào Docker Hub sử dụng Secrets đã tạo ở Bước 2
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Build Image từ Dockerfile và Push lên Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Thay 'ten_tai_khoan' bằng tên Docker Hub của bạn, 'ten_du_an' tùy ý
        tags: ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
